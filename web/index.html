<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车队调度系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; }
    .header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .stats { display: flex; gap: 20px; margin-left: auto; font-size: 13px; }
    .header .stat { background: rgba(255,255,255,.1); padding: 4px 12px; border-radius: 4px; }
    .container { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 48px); }
    #map { width: 100%; height: 100%; background: #e8e8e8; }
    .sidebar { overflow-y: auto; background: #fff; border-left: 1px solid #ddd; }
    .tabs { display: flex; border-bottom: 2px solid #eee; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
    .panel { display: none; padding: 12px; }
    .panel.active { display: block; }
    .card { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-title { font-weight: 600; font-size: 14px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: #fff; }
    .badge-idle { background: #52c41a; }
    .badge-en_route { background: #1890ff; }
    .badge-delivering { background: #fa8c16; }
    .badge-charging { background: #722ed1; }
    .badge-offline { background: #999; }
    .badge-fault { background: #f5222d; }
    .badge-pending { background: #faad14; color: #333; }
    .badge-assigned { background: #1890ff; }
    .badge-picked_up { background: #fa8c16; }
    .badge-delivered { background: #52c41a; }
    .badge-cancelled { background: #999; }
    .badge-failed { background: #f5222d; }
    .meta { font-size: 12px; color: #888; line-height: 1.8; }
    .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .actions { margin: 12px; }
    .empty { text-align: center; color: #bbb; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚐 车队调度系统</h1>
    <div class="stats">
      <span class="stat" id="stat-vehicles">车辆: -</span>
      <span class="stat" id="stat-orders">订单: -</span>
      <span class="stat" id="stat-idle">空闲: -</span>
    </div>
  </div>
  <div class="container">
    <div id="map"></div>
    <div class="sidebar">
      <div class="tabs">
        <div class="tab active" data-panel="vehicles">车辆</div>
        <div class="tab" data-panel="orders">订单</div>
        <div class="tab" data-panel="create-order">新建订单</div>
      </div>

      <div id="vehicles" class="panel active">
        <div id="vehicle-list"></div>
      </div>

      <div id="orders" class="panel">
        <div id="order-list"></div>
      </div>

      <div id="create-order" class="panel">
        <div class="form-group"><label>取货地址</label><input id="pickup-addr" placeholder="取货地址"></div>
        <div class="form-group"><label>取货纬度</label><input id="pickup-lat" type="number" step="0.0001" value="39.9042"></div>
        <div class="form-group"><label>取货经度</label><input id="pickup-lng" type="number" step="0.0001" value="116.4074"></div>
        <div class="form-group"><label>送达地址</label><input id="dropoff-addr" placeholder="送达地址"></div>
        <div class="form-group"><label>送达纬度</label><input id="dropoff-lat" type="number" step="0.0001" value="39.9142"></div>
        <div class="form-group"><label>送达经度</label><input id="dropoff-lng" type="number" step="0.0001" value="116.4174"></div>
        <div class="actions">
          <button class="btn btn-primary" onclick="createOrder()">创建订单</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api';
    let vehicles = [], orders = [];

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    async function fetchJSON(url, opts) {
      const res = await fetch(url, opts);
      return res.json();
    }

    async function loadVehicles() {
      try {
        vehicles = await fetchJSON(API + '/vehicles') || [];
        renderVehicles();
        updateStats();
      } catch(e) { console.error('load vehicles:', e); }
    }

    async function loadOrders() {
      try {
        orders = await fetchJSON(API + '/orders') || [];
        renderOrders();
        updateStats();
      } catch(e) { console.error('load orders:', e); }
    }

    function renderVehicles() {
      const el = document.getElementById('vehicle-list');
      if (!vehicles.length) { el.innerHTML = '<div class="empty">暂无车辆</div>'; return; }
      el.innerHTML = vehicles.map(v => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${v.name || v.id}</span>
            <span class="badge badge-${v.status}">${v.status}</span>
          </div>
          <div class="meta">
            ID: ${v.id}<br>
            位置: ${v.latitude.toFixed(4)}, ${v.longitude.toFixed(4)}<br>
            电量: ${v.battery.toFixed(0)}% | 速度: ${v.speed.toFixed(1)} km/h
          </div>
        </div>
      `).join('');
    }

    function renderOrders() {
      const el = document.getElementById('order-list');
      if (!orders.length) { el.innerHTML = '<div class="empty">暂无订单</div>'; return; }
      el.innerHTML = orders.map(o => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${o.id.slice(0,8)}...</span>
            <span class="badge badge-${o.status}">${o.status}</span>
          </div>
          <div class="meta">
            取货: ${o.pickup_addr || `${o.pickup_lat.toFixed(4)},${o.pickup_lng.toFixed(4)}`}<br>
            送达: ${o.dropoff_addr || `${o.dropoff_lat.toFixed(4)},${o.dropoff_lng.toFixed(4)}`}<br>
            车辆: ${o.vehicle_id || '未分配'}
          </div>
          ${o.status === 'pending' ? `<button class="btn btn-primary btn-sm" style="margin-top:6px" onclick="dispatchOrder('${o.id}')">调度</button>` : ''}
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('stat-vehicles').textContent = `车辆: ${vehicles.length}`;
      document.getElementById('stat-orders').textContent = `订单: ${orders.length}`;
      const idle = vehicles.filter(v => v.status === 'idle').length;
      document.getElementById('stat-idle').textContent = `空闲: ${idle}`;
    }

    async function createOrder() {
      const body = {
        pickup_addr: document.getElementById('pickup-addr').value,
        pickup_lat: parseFloat(document.getElementById('pickup-lat').value),
        pickup_lng: parseFloat(document.getElementById('pickup-lng').value),
        dropoff_addr: document.getElementById('dropoff-addr').value,
        dropoff_lat: parseFloat(document.getElementById('dropoff-lat').value),
        dropoff_lng: parseFloat(document.getElementById('dropoff-lng').value),
      };
      try {
        await fetchJSON(API + '/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        alert('订单已创建');
        loadOrders();
      } catch(e) { alert('创建失败: ' + e.message); }
    }

    async function dispatchOrder(id) {
      try {
        const res = await fetchJSON(API + '/orders/' + id + '/dispatch', { method: 'POST' });
        if (res.error) { alert('调度失败: ' + res.error); return; }
        alert('调度成功');
        loadOrders();
        loadVehicles();
      } catch(e) { alert('调度失败: ' + e.message); }
    }

    // Poll every 5s
    function poll() { loadVehicles(); loadOrders(); }
    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
